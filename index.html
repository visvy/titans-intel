<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TITANS Intel — Player &amp; Alliance Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0b0e13; --panel:#141922; --panel2:#1b2230; --line:#252d3b;
  --parchment:#e9ecf2; --dim:#8b94a7; --gold:#e3ab3f; --peace:#4fc07a; --war:#e0584a; --vet:#5fb2f0;
  --mono:'JetBrains Mono',monospace; --sans:'Inter',system-ui,sans-serif;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--ink);color:var(--parchment);font-family:var(--sans);font-size:14.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--gold);text-decoration:none} a:hover{text-decoration:underline}
button{font-family:var(--sans);cursor:pointer}
::selection{background:var(--gold);color:#141005}

header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(11,14,19,.92);backdrop-filter:blur(8px);z-index:20}
.hdr-left{display:flex;align-items:center;gap:12px;min-width:0}
.hdr-center{display:flex;align-items:center;gap:8px;justify-content:center}
.hdr-right{display:flex;align-items:center;gap:8px;justify-content:flex-end;min-width:0}
header h1{font-weight:800;font-size:18px;letter-spacing:.02em;white-space:nowrap}
header h1 span{color:var(--gold)}
select,input[type=text],textarea{background:var(--panel2);border:1px solid var(--line);color:var(--parchment);padding:11px 13px;border-radius:10px;font-family:var(--sans);font-size:14px}
select:focus,input:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:-1px;border-color:transparent}
#serverSel{font-weight:600;min-width:160px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--dim);display:inline-block;flex:none}
.dot.on{background:var(--peace);box-shadow:0 0 8px var(--peace)} .dot.off{background:var(--war)}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--parchment);padding:11px 18px;border-radius:10px;font-size:14px;font-weight:500;min-height:42px}
.btn:hover{border-color:var(--gold)}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--gold);border-color:var(--gold);color:#141005;font-weight:700}
.btn.small{padding:8px 13px;font-size:13px;min-height:36px}
.btn.war{border-color:rgba(224,88,74,.55);color:var(--war)}
.btn.war:hover{background:rgba(224,88,74,.1)}
.btn:disabled{opacity:.5;cursor:default}
.btn.icon{padding:10px 14px;font-size:16px;min-height:42px}

.layout{display:grid;grid-template-columns:350px 1fr;min-height:calc(100vh - 66px)}
.sidebar{border-right:1px solid var(--line);padding:16px;display:flex;flex-direction:column;gap:20px}
.main{padding:20px 22px;min-width:0;padding-bottom:60px}
.main.anim > *{animation:fadeUp .28s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes rowIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.rowlist .prow{animation:rowIn .22s ease both}
@media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}

.searchrow{display:flex;gap:8px}
.searchrow input{flex:1;min-width:0}
.hint{color:var(--dim);font-size:12.5px}
.seclabel{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);font-weight:700;margin-bottom:9px}

.rowlist{display:flex;flex-direction:column;gap:7px;max-height:32vh;overflow:auto}
.prow{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);cursor:pointer}
.prow:hover{border-color:var(--gold);background:var(--panel2)}
.prow .nm{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prow .sub{color:var(--dim);font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prow .right{margin-left:auto;text-align:right;font-family:var(--mono);font-size:12px;color:var(--gold);white-space:nowrap}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--line);color:var(--dim);white-space:nowrap}
.badge.peace{color:var(--peace);border-color:rgba(79,192,122,.5);background:rgba(79,192,122,.08)}
.badge.war{color:var(--war);border-color:rgba(224,88,74,.5);background:rgba(224,88,74,.08)}
.badge.gold{color:var(--gold);border-color:rgba(227,171,63,.5);background:rgba(227,171,63,.08)}

.copyb{background:none;border:0;color:var(--dim);font-size:14px;padding:6px 8px;border-radius:8px;min-width:32px;min-height:32px}
.copyb:hover{color:var(--gold);background:var(--panel2)}

.detail-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.detail-head h2{font-size:26px;font-weight:800;letter-spacing:-.01em}
.idtag{font-family:var(--mono);color:var(--dim);font-size:12px}
.statgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin:16px 0}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px}
.stat .k{color:var(--dim);font-size:11px;letter-spacing:.07em;text-transform:uppercase;font-weight:600}
.stat .v{font-family:var(--mono);font-size:16px;margin-top:4px;word-break:break-word}
.stat .v.gold{color:var(--gold)} .stat .v.peace{color:var(--peace)} .stat .v.war{color:var(--war)}

h3.sec{font-size:12.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);font-weight:700;margin:26px 0 12px;border-bottom:1px solid var(--line);padding-bottom:8px}
.tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:var(--r);background:var(--panel)}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:640px}
th{color:var(--dim);text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.07em;padding:10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:1;white-space:nowrap}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--gold)}
th .arrow{color:var(--gold);font-size:10px}
td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:0}
tr.click{cursor:pointer} tr.click:hover td{background:var(--panel2)}
tr.done td{opacity:.4}
.vet{font-weight:700;color:var(--vet) !important;background:rgba(95,178,240,.1);padding:2px 8px;border-radius:10px;border:1px solid rgba(95,178,240,.4)}
.vet:hover{background:rgba(95,178,240,.2);text-decoration:none}
.rowlist::-webkit-scrollbar,.desc::-webkit-scrollbar,.tblwrap::-webkit-scrollbar{width:8px;height:8px}
.rowlist::-webkit-scrollbar-thumb,.desc::-webkit-scrollbar-thumb,.tblwrap::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
.prow,.btn,.copyb{transition:border-color .12s ease, background .12s ease, transform .06s ease}
.mono{font-family:var(--mono)}
.muted{color:var(--dim)}

.timeline{display:flex;flex-direction:column}
.tl-item{display:flex;gap:12px;position:relative;padding:0 0 18px 24px;flex-wrap:wrap;animation:rowIn .25s ease both}
.tl-item::before{content:"";position:absolute;left:6px;top:6px;width:9px;height:9px;border-radius:50%;background:var(--gold)}
.tl-item::after{content:"";position:absolute;left:10px;top:17px;bottom:-2px;width:2px;background:var(--line);border-radius:2px}
.tl-item:last-child::after{display:none}
.tl-item .when{font-family:var(--mono);font-size:12px;color:var(--dim);min-width:150px}
.empty{color:var(--dim);padding:22px 4px;font-size:14px}
.err{color:var(--war);font-size:13.5px;padding:10px 0}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
.footerbar{display:flex;gap:8px;margin-top:auto;flex-wrap:wrap}

.spygrid{display:flex;gap:10px;flex-wrap:wrap}
.spycard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:8px;width:180px;max-width:46vw}
.spycard img{width:100%;border-radius:8px;cursor:zoom-in;display:block}
.spycard .meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:11px;color:var(--dim)}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:50;cursor:zoom-out}
#lightbox img{max-width:96vw;max-height:96vh;border-radius:10px;animation:fadeUp .2s ease}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gold);color:#141005;font-weight:700;padding:11px 20px;border-radius:24px;display:none;z-index:60;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.notesbox{width:100%;min-width:170px;min-height:40px;resize:vertical;font-size:13px}
.etools{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;align-items:center}
input[type=checkbox].big{width:20px;height:20px;accent-color:var(--war);cursor:pointer}

@media (max-width:920px){
  header{grid-template-columns:auto 1fr;row-gap:8px}
  .hdr-center{grid-column:1 / -1;justify-content:stretch}
  .hdr-center select{flex:1}
  .hdr-right{display:none}
  .layout{grid-template-columns:1fr}
  .sidebar{border-right:0;border-bottom:1px solid var(--line)}
  .main{padding:16px 14px 70px}
  .detail-head h2{font-size:22px}
  .statgrid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .tl-item .when{min-width:100%}
}
</style>
</head>
<body>

<header>
  <div class="hdr-left">
    <button class="btn icon" id="backBtn" title="Go back">←</button>
    <h1>TITANS <span>INTEL</span></h1>
  </div>
  <div class="hdr-center">
    <span id="apiDot" class="dot"></span>
    <select id="serverSel" title="Game server"></select>
  </div>
  <div class="hdr-right">
    <input id="apiUrl" type="text" title="gge-tracker API base URL" style="width:220px" />
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div>
      <div class="seclabel">Alliance search</div>
      <div class="searchrow">
        <input id="qa" type="text" placeholder="Alliance name (partial OK) or ID" />
        <button class="btn primary" id="goAlliance">Find</button>
      </div>
      <div id="allianceStatus"></div>
      <div class="rowlist" id="allianceResults" style="margin-top:10px"></div>
    </div>

    <div>
      <div class="seclabel">Top 5 alliances</div>
      <div class="rowlist" id="topAlliances"><div class="hint">Loading…</div></div>
    </div>

    <div>
      <div class="seclabel">Player search</div>
      <div class="searchrow">
        <input id="q" type="text" placeholder="Exact player name" />
        <button class="btn" id="goBtn">Scout</button>
      </div>
      <div id="searchStatus"></div>
    </div>

    <div>
      <div class="seclabel">Enemy list</div>
      <button class="btn war" id="openEnemies" style="width:100%">⚔ Open enemy list (<span id="enemyCount">0</span>)</button>
    </div>

    <div>
      <div class="seclabel">Watchlist</div>
      <div class="rowlist" id="watchlist"></div>
      <button class="btn small" id="refreshWatch" style="margin-top:8px">Refresh all</button>
    </div>

    <div class="footerbar">
      <button class="btn small" id="exportBtn">Export data</button>
      <button class="btn small" id="importBtn">Import data</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
    </div>
  </aside>

  <main class="main anim" id="main">
    <div class="empty">
      Pick a server up top (defaults to World 2), then find an alliance or player.<br><br>
      Data comes from gge-tracker's database: real alliance history, peace &amp; ban status, live castle defenses.
    </div>
  </main>
</div>

<div id="lightbox"><img id="lightboxImg" alt="spy report"></div>
<div id="toast"></div>
<input type="file" id="spyFile" accept="image/*" style="display:none">

<script>
"use strict";
const LSKEY = "ggeIntel.v4";
const DEF_API = "https://api.gge-tracker.com/api/v1";
const DEF_SERVER = "INT2"; // World 2
const $ = id => document.getElementById(id);
let API = localStorage.getItem(LSKEY + ".apiT") || DEF_API;

/* ---------- persistence ---------- */
let db = { players:{}, enemies:{} };
try { db = Object.assign({players:{},enemies:{}}, JSON.parse(localStorage.getItem(LSKEY)) || {}); } catch(e){}
function save(){
  try { localStorage.setItem(LSKEY, JSON.stringify(db)); }
  catch(e){ toast("Storage full — delete spy reports or export + clear"); }
}

/* ---------- helpers ---------- */
const fmt = n => n==null||n===""? "—" : Number(n).toLocaleString("en-US");
const esc = s => String(s ?? "").replace(/[&<>"]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const escA = s => esc(s).replace(/'/g,"&#39;");
function durMs(ms){
  if (!isFinite(ms) || ms <= 0) return null;
  const s = ms/1000, d = Math.floor(s/86400), h = Math.floor(s%86400/3600), m = Math.floor(s%3600/60);
  return (d? d+"d ":"") + (h? h+"h ":"") + m + "m";
}
const dshort = t => new Date(t).toLocaleDateString(undefined,{day:"2-digit",month:"short",year:"2-digit"});
const dfull  = t => new Date(t).toLocaleString(undefined,{dateStyle:"short",timeStyle:"short"});
const KINGDOMS = {0:"Great Empire",1:"Everwinter Glacier",2:"Burning Sands",3:"Fire Peaks",4:"Storm Islands",10:"Berimond"};
const CASTLE_TYPES = {1:"Main castle",4:"Outpost",12:"Kingdom castle",3:"Capital",22:"Metropolis",23:"King's tower",25:"Monument",10:"Village"};
const srvKey = () => "T:" + $("serverSel").value;
const pkey = id => srvKey() + ":" + id;
const prec = id => db.players[pkey(id)] || (db.players[pkey(id)] = { name:"", watch:false, snaps:[], spy:[] });

let toastT;
function toast(msg){
  const t = $("toast"); t.textContent = msg; t.style.display = "block";
  clearTimeout(toastT); toastT = setTimeout(()=> t.style.display="none", 1800);
}
function copyText(s){
  (navigator.clipboard ? navigator.clipboard.writeText(s) : Promise.reject())
    .then(()=>toast("Copied: " + s))
    .catch(()=>{ const i=document.createElement("textarea"); i.value=s; document.body.appendChild(i); i.select(); document.execCommand("copy"); i.remove(); toast("Copied: " + s); });
}
const copyBtn = name => `<button class="copyb" title="Copy name" onclick="event.stopPropagation();copyText('${escA(name)}')">📋</button>`;
function setMain(html){
  const m = $("main");
  m.classList.remove("anim");
  m.innerHTML = html;
  void m.offsetWidth;
  m.classList.add("anim");
}

/* peace / ban: tracker marks bans as very long protection */
function classifyPeace(dateStr){
  if (!dateStr) return { until:null, banned:false };
  const t = Date.parse(dateStr);
  if (!isFinite(t) || t <= Date.now()) return { until:null, banned:false };
  const banned = (t - Date.now()) > 63*24*3600*1000;
  return { until:t, banned };
}
const peaceBadge = (until, banned) => {
  if (banned) return `<span class="badge war" title="banned until ${dfull(until)}">BANNED</span>`;
  if (!until || until <= Date.now()) return '<span class="muted">—</span>';
  return `<span class="badge peace" title="until ${dfull(until)}">${durMs(until - Date.now())}</span>`;
};

/* ---------- snapshots ---------- */
function snap(id, name, aid, an, mp, lvl, llvl, peaceUntil){
  const r = prec(id);
  r.name = name;
  const last = r.snaps[r.snaps.length-1], now = Date.now();
  if (last && now - last.t < 60000 && String(last.AID) === String(aid)) { last.t = now; last.MP = mp; last.PU = peaceUntil; }
  else r.snaps.push({ t:now, AID:aid, AN:an, MP:mp, L:lvl, LL:llvl, PU:peaceUntil });
  if (r.snaps.length > 500) r.snaps = r.snaps.slice(-500);
}

/* ---------- API ---------- */
function tCall(path){
  return fetch(API + path, { headers: { "gge-server": $("serverSel").value } })
    .then(r=>r.json())
    .then(j=>{ if (j && j.error) throw new Error(j.error); return j; });
}
/* cached per-player alliance history, 6h TTL */
async function tPlayerHist(id, force){
  const r = prec(id);
  if (!force && r.hist && Date.now() - r.hist.t < 6*3600*1000) return r.hist.ups;
  const ups = ((await tCall(`/updates/players/${id}/alliances`)).updates || [])
    .sort((a,b)=>Date.parse(b.date)-Date.parse(a.date));
  r.hist = { t: Date.now(), ups: ups.slice(0, 10) };
  return ups;
}
const sinceFromUps = (ups, aid) =>
  (ups.length && String(ups[0].new_alliance_id) === String(aid)) ? Date.parse(ups[0].date) : null;

function markLongest(past, currentDur){
  let best = null;
  for (const p of past) if (p.dur > currentDur && (!best || p.dur > best.dur)) best = p;
  if (best) best.bold = true;
  return past;
}
function pastFromUps(ups, aid, max=3){
  const past = [];
  for (const u of ups){
    for (const cand of [ {id:u.new_alliance_id, name:u.new_alliance_name}, {id:u.old_alliance_id, name:u.old_alliance_name} ]){
      if (cand.id == null) continue;
      if (String(cand.id) === String(aid)) continue;
      if (past.some(x=>String(x.id)===String(cand.id))) continue;
      past.push({ id:cand.id, name:cand.name });
    }
    if (past.length >= max) break;
  }
  const durs = {};
  for (let i = 0; i < ups.length; i++){
    const id = ups[i].new_alliance_id;
    if (id == null) continue;
    const from = Date.parse(ups[i].date);
    const to = i === 0 ? Date.now() : Date.parse(ups[i-1].date);
    durs[id] = (durs[id]||0) + Math.max(0, to - from);
  }
  const currentConfirmed = ups.length && String(ups[0].new_alliance_id) === String(aid);
  const currentDur = currentConfirmed ? (durs[aid]||0) : Infinity;
  for (const p of past) p.dur = durs[p.id] || 0;
  return markLongest(past.slice(0, max), currentDur);
}
const pastCellHtml = list => list.length
  ? list.map(a=>`<a href="#" ${a.bold?`class="vet" title="spent longer here (${durMs(a.dur)||"?"}) than in the current alliance"`:""} onclick="event.preventDefault();event.stopPropagation();openAlliance('${escA(a.id)}')">${esc(a.name||("#"+a.id))}</a>`).join('<span class="muted"> · </span>')
  : '<span class="muted">—</span>';
const isMockedAlliance = name => /horde\s+of\s+enemie/i.test(String(name||""));

/* ---------- navigation ---------- */
let currentView = { type:null, id:null };
let restoringView = false;
function pushView(v){
  if (restoringView) return;
  if (history.state && JSON.stringify(history.state) === JSON.stringify(v)) return;
  history.pushState(v, "");
}
window.addEventListener("popstate", async e => {
  const s = e.state;
  restoringView = true;
  try {
    if (!s) { currentView = { type:null, id:null }; setMain(`<div class="empty">Pick an alliance or player to scout.</div>`); }
    else if (s.type === "player") await openPlayer(s.id);
    else if (s.type === "alliance") await openAlliance(s.id);
    else if (s.type === "enemies") openEnemies();
  } finally { restoringView = false; }
});
$("backBtn").onclick = () => history.back();
function rerender(){
  if (currentView.type === "player") openPlayer(currentView.id);
  else if (currentView.type === "alliance") openAlliance(currentView.id, true);
  else if (currentView.type === "enemies") openEnemies();
}

/* ---------- servers ---------- */
async function loadServers(){
  const sel = $("serverSel");
  $("apiDot").className = "dot";
  try {
    const list = await fetch(API + "/servers", { headers:{ "gge-server": DEF_SERVER } }).then(r=>r.json());
    const arr = Array.isArray(list) ? list : [];
    if (!arr.length) throw new Error("no servers returned");
    const gge = arr.filter(s=>!String(s).startsWith("E4K")), e4k = arr.filter(s=>String(s).startsWith("E4K"));
    const label = s => s.replace(/^INT/,"WORLD").replace(/^E4K/,"E4K ");
    sel.innerHTML = `<optgroup label="Goodgame Empire">${gge.map(s=>`<option value="${s}">${esc(label(s))}</option>`).join("")}</optgroup>`
                  + (e4k.length?`<optgroup label="E4K">${e4k.map(s=>`<option value="${s}">${esc(label(s))}</option>`).join("")}</optgroup>`:"");
    const saved = localStorage.getItem(LSKEY + ".serverT2");
    const want = (saved && arr.includes(saved)) ? saved : (arr.includes(DEF_SERVER) ? DEF_SERVER : arr[0]);
    sel.value = want;
    $("apiDot").className = "dot on";
  } catch(e){
    $("apiDot").className = "dot off";
    setMain(`<div class="err">Could not reach ${esc(API)}: ${esc(e.message||"network error")}. Check your connection or browser extensions (F12 console).</div>`);
  }
  renderWatchlist(); updateEnemyCount(); loadTopAlliances();
}
$("serverSel").addEventListener("change", () => {
  localStorage.setItem(LSKEY + ".serverT2", $("serverSel").value);
  renderWatchlist(); updateEnemyCount(); loadTopAlliances();
});
$("apiUrl").value = API;
$("apiUrl").addEventListener("change", () => {
  API = $("apiUrl").value.trim().replace(/\/+$/,"") || DEF_API;

/* ---------- top alliances ---------- */
const MEDALS = ["🥇","🥈","🥉","4","5"];
async function loadTopAlliances(){
  const el = $("topAlliances");
  el.innerHTML = `<div class="hint"><span class="spin"></span> Loading…</div>`;
  try {
    const r = await tCall("/alliances?page=1&orderBy=might_current&orderType=DESC");
    const top = (r.alliances||[]).slice(0,5);
    el.innerHTML = top.length ? top.map((a,i)=>`
      <div class="prow" style="animation-delay:${i*30}ms" data-aid="${a.alliance_id}">
        <span style="width:22px;text-align:center;flex:none;font-size:${i<3?"15px":"13px"};color:var(--dim)">${MEDALS[i]}</span>
        <div style="min-width:0"><div class="nm">${esc(a.alliance_name)}</div>
        <div class="sub">${a.player_count} members</div></div>
        <div class="right">${fmt(a.might_current)} MP</div>
      </div>`).join("") : `<div class="hint">No data for this server.</div>`;
    el.querySelectorAll("[data-aid]").forEach(x => x.onclick = () => openAlliance(x.dataset.aid));
  } catch(e){
    el.innerHTML = `<div class="hint">Couldn't load top alliances.</div>`;
  }
}

/* ---------- alliance search ---------- */
async function findAlliance(){
  const q = $("qa").value.trim();
  if (!q) return;
  if (/^\d+$/.test(q)) return openAlliance(q);
  $("allianceStatus").innerHTML = `<div class="hint" style="margin-top:8px"><span class="spin"></span> searching…</div>`;
  $("allianceResults").innerHTML = "";
  try {
    const ql = q.toLowerCase();
    const list = [];
    try {
      const a = await tCall("/alliances/name/" + encodeURIComponent(q));
      if (a && a.alliance_id) list.push({ id:a.alliance_id, name:a.alliance_name, sub:`${a.player_count} members · ${fmt(a.might_current)} MP` });
    } catch(e){}
    for (let p=1; p<=8; p++){
      const r = await tCall(`/alliances?page=${p}&orderBy=might_current&orderType=DESC`);
      for (const a of (r.alliances||[]))
        if (String(a.alliance_name).toLowerCase().includes(ql) && !list.some(x=>String(x.id)===String(a.alliance_id)))
          list.push({ id:a.alliance_id, name:a.alliance_name, sub:`${a.player_count} members · ${fmt(a.might_current)} MP` });
      if (p >= (r.pagination?.total_pages||1) || list.length >= 15) break;
    }
    $("allianceStatus").innerHTML = list.length ? "" : `<div class="hint" style="margin-top:8px">Nothing found in the top alliances — try the exact name or ID.</div>`;
    $("allianceResults").innerHTML = list.map((a,i)=>`<div class="prow" style="animation-delay:${i*30}ms" data-aid="${a.id}">
      <div style="min-width:0"><div class="nm">${esc(a.name || ("#"+a.id))}</div><div class="sub">${esc(a.sub||"")}</div></div>
      <div class="right">#${a.id}</div></div>`).join("");
    $("allianceResults").querySelectorAll("[data-aid]").forEach(r => r.onclick = () => openAlliance(r.dataset.aid));
  } catch(e){
    $("allianceStatus").innerHTML = `<div class="err">${esc(e.message)}</div>`;
  }
}

let spyTarget = null;
$("spyFile").onchange = e => {
  const f = e.target.files[0];
  e.target.value = "";
  if (!f || spyTarget == null) return;
  const img = new Image();
  img.onload = () => {
    const MAX = 1200, sc = Math.min(1, MAX/Math.max(img.width,img.height));
    const cv = document.createElement("canvas");
    cv.width = Math.round(img.width*sc); cv.height = Math.round(img.height*sc);
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
    const r = prec(spyTarget);
    (r.spy || (r.spy=[])).push({ t:Date.now(), img: cv.toDataURL("image/jpeg",0.72) });
    save(); rerender();
    toast("Spy report attached");
  };
  img.onerror = () => toast("Could not read image");
  img.src = URL.createObjectURL(f);
};
function askSpy(id, name){ spyTarget = id; if (name) prec(id).name = name; $("spyFile").click(); }

function delSpy(id, i){ db.players[pkey(id)].spy.splice(i,1); save(); rerender(); }

const enemies = () => db.enemies[srvKey()] || (db.enemies[srvKey()] = {});
function updateEnemyCount(){ $("enemyCount").textContent = Object.keys(db.enemies[srvKey()]||{}).length; }
function addEnemy(id, name, alliance, might, peaceUntil, banned){
  const e = enemies();
  if (!e[id]) e[id] = { id, name, alliance:alliance||"", addedAt:Date.now(), attacked:false, attackedAt:null, notes:"", peaceUntil:peaceUntil||null, banned:!!banned, might:might||null };
  else Object.assign(e[id], { name, alliance:alliance||e[id].alliance, might:might??e[id].might, peaceUntil:peaceUntil??e[id].peaceUntil, banned: banned??e[id].banned });
  save(); updateEnemyCount();
}
function removeEnemy(id){ delete enemies()[id]; save(); updateEnemyCount(); openEnemies(); }
function toggleAttacked(id, on){
  const en = enemies()[id]; if (!en) return;
  en.attacked = on; en.attackedAt = on ? Date.now() : null;
  save(); openEnemies();
}
function setNotes(id, v){ const en = enemies()[id]; if (en){ en.notes = v; save(); } }

const sortArrow = (state, key) => state.key === key ? `<span class="arrow">${state.dir>0?"▲":"▼"}</span>` : "";
function sortBy(list, key, dir, getters){
  const g = getters[key] || (x=>x[key]);
  return list.slice().sort((a,b)=>{
    const va = g(a), vb = g(b);
    if (typeof va === "string" || typeof vb === "string") return dir * String(va??"").localeCompare(String(vb??""));
    return dir * ((va??-Infinity) - (vb??-Infinity));
  });
}
function openEnemies(){
  currentView = { type:"enemies", id:null };
  pushView({ type:"enemies" });
  const all = Object.values(enemies());
  const getters = { name:e=>e.name?.toLowerCase(), alliance:e=>e.alliance?.toLowerCase(), might:e=>Number(e.might)||0, peace:e=>e.peaceUntil||0, added:e=>e.addedAt };
  let list = sortBy(all, enemySort.key, enemySort.dir, getters);
  list = list.slice().sort((a,b)=> a.attacked - b.attacked); // attacked sink to bottom, stable
  const shown = list.filter(e => enemyFilter==="all" || (enemyFilter==="open" && !e.attacked) || (enemyFilter==="peace" && e.peaceUntil > Date.now() && !e.banned));
  const done = all.filter(e=>e.attacked).length;
  const th = (label, key) => `<th class="sortable" data-esort="${key}">${label} ${sortArrow(enemySort, key)}</th>`;
  setMain(`
    <div class="detail-head">
      <h2>⚔ Enemy list</h2>
      <span class="idtag">${$("serverSel").value} · ${all.length} targets · ${done} attacked</span>
    </div>
    ${all.length ? `<div class="hint" style="font-style:italic;margin:2px 0 6px;color:var(--gold)">
      "<span id="roastTxt">${esc(ROASTS[Math.floor(Math.random()*ROASTS.length)])}</span>"
      <button class="copyb" id="reroast" title="another one">🎲</button></div>` : ""}
    <div class="etools">
      <select id="efilter">
        <option value="all"${enemyFilter==="all"?" selected":""}>All</option>
        <option value="open"${enemyFilter==="open"?" selected":""}>Not attacked yet</option>
        <option value="peace"${enemyFilter==="peace"?" selected":""}>In peace mode</option>
      </select>
      <button class="btn small" id="eRefresh">Refresh statuses</button>
      <button class="btn small" id="eCsv">Export CSV</button>
      <button class="btn small" id="eCopyAll">Copy all names</button>
      <button class="btn small" id="eResetAtt">Reset attacked ✓</button>
      <button class="btn small war" id="eClear">Clear list</button>
    </div>
    ${shown.length ? `<div class="tblwrap"><table>
      <tr><th>✓</th>${th("Name","name")}${th("Alliance","alliance")}${th("Might","might")}${th("Peace","peace")}<th style="width:26%">Notes</th><th>Spy</th><th></th></tr>
      ${shown.map(e=>{
        const spies = (db.players[pkey(e.id)]?.spy || []).length;
        return `<tr class="${e.attacked?"done":""}">
        <td><input type="checkbox" class="big" ${e.attacked?"checked":""} title="${e.attackedAt?("attacked "+dfull(e.attackedAt)):"mark attacked"}" onchange="toggleAttacked('${escA(e.id)}',this.checked)"></td>
        <td><a href="#" onclick="event.preventDefault();openPlayer('${escA(e.name)}')">${esc(e.name)}</a> ${copyBtn(e.name)}</td>
        <td class="muted">${esc(e.alliance||"—")}</td>
        <td class="mono">${fmt(e.might)}</td>
        <td>${peaceBadge(e.peaceUntil, e.banned)}</td>
        <td><textarea class="notesbox" placeholder="notes…" onchange="setNotes('${escA(e.id)}',this.value)">${esc(e.notes)}</textarea></td>
        <td><button class="btn small" onclick="askSpy('${escA(e.id)}','${escA(e.name)}')">📷${spies?" "+spies:""}</button>
            ${spies?`<button class="btn small" onclick="showSpy('${escA(e.id)}',${spies-1})">👁</button>`:""}</td>
        <td><button class="btn small" onclick="removeEnemy('${escA(e.id)}')">✕</button></td>
      </tr>`;}).join("")}
    </table></div>` : `<div class="empty">No targets${enemyFilter!=="all"?" matching the filter":""}. Open an alliance and add members.</div>`}
    <div class="hint" style="margin-top:8px">Check ✓ once you've attacked a target. Click column headers to sort. Peace status is from the last refresh.</div>`);
  $("efilter").onchange = e => { enemyFilter = e.target.value; openEnemies(); };
  if ($("reroast")) $("reroast").onclick = () => { $("roastTxt").textContent = ROASTS[Math.floor(Math.random()*ROASTS.length)]; };
  $("main").querySelectorAll("[data-esort]").forEach(h => h.onclick = () => {
    const k = h.dataset.esort;
    enemySort = { key:k, dir: enemySort.key===k ? -enemySort.dir : (k==="name"||k==="alliance"?1:-1) };
    openEnemies();
  });
  $("eCsv").onclick = exportEnemiesCsv;
  $("eCopyAll").onclick = () => copyText(all.map(e=>e.name).join("\n"));
  $("eResetAtt").onclick = () => { for (const e of all){ e.attacked=false; e.attackedAt=null; } save(); openEnemies(); };
  $("eClear").onclick = () => { if (confirm("Remove ALL targets on this server?")){ db.enemies[srvKey()] = {}; save(); updateEnemyCount(); openEnemies(); } };
  $("eRefresh").onclick = refreshEnemies;

async function refreshEnemies(){
  const list = Object.values(enemies());
  const btn = $("eRefresh"); btn.disabled = true;
  let i = 0;
  for (const e of list){
    btn.textContent = `Refreshing ${++i}/${list.length}…`;
    try {
      const p = await tCall("/players/" + encodeURIComponent(e.name));
      e.might = Number(p.might_current);
      const pc = classifyPeace(p.peace_disabled_at);
      e.peaceUntil = pc.until; e.banned = pc.banned;
      e.alliance = p.alliance_name || "";
      e.name = p.player_name;
    } catch(err){}
    await new Promise(r=>setTimeout(r,350));
  }
  save(); openEnemies();
}
function exportEnemiesCsv(){
  const list = Object.values(enemies());
  const q = v => `"${String(v??"").replace(/"/g,'""')}"`;
  const rows = [["name","player_id","alliance","might","peace_until","banned","attacked","attacked_at","notes","added_at"].join(",")];
  for (const e of list)
    rows.push([q(e.name),q(e.id),q(e.alliance),e.might??"",e.peaceUntil?new Date(e.peaceUntil).toISOString():"",e.banned?1:0,e.attacked?1:0,e.attackedAt?new Date(e.attackedAt).toISOString():"",q(e.notes),new Date(e.addedAt).toISOString()].join(","));
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob(["\uFEFF"+rows.join("\r\n")],{type:"text/csv;charset=utf-8"}));
  a.download = `enemies_${$("serverSel").value}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function bindPlayerHead(id, name, alliance, might, peaceUntil, banned){
  const r = prec(id); r.name = name;
  $("watchBtn").onclick = () => { r.watch = !r.watch; save(); renderWatchlist(); $("watchBtn").textContent = r.watch ? "★ Watching" : "☆ Watch"; };

    else { addEnemy(id, name, alliance, might, peaceUntil, banned); toast("Added to enemy list"); $("enemyBtn").textContent = "⚔ On enemy list"; $("enemyBtn").classList.remove("war"); }
  };
  $("spyBtn").onclick = () => askSpy(id, name);
  $("reBtn").onclick = () => openPlayer(name);
}

async function openPlayer(nameQ){

  setMain(`<div class="empty"><span class="spin"></span> Fetching ${esc(nameQ)}…</div>`);

  let p;
  try { p = await tCall("/players/" + encodeURIComponent(String(nameQ).trim())); }
  catch(e){ setMain(`<div class="err">${esc(e.message)} — the tracker needs the exact player name.</div>`); return; }
  const id = p.player_id, name = p.player_name;
  const pc = classifyPeace(p.peace_disabled_at);
  snap(id, name, p.alliance_id, p.alliance_name, p.might_current, p.level, p.legendary_level, pc.banned?null:pc.until); save();

  let updates = [];
  try { updates = await tPlayerHist(id, true); } catch(e){}
  let since = null;
  if (p.alliance_id && updates.length && String(updates[0].new_alliance_id) === String(p.alliance_id)) since = Date.parse(updates[0].date);

  setMain(playerHead(id, name, pc.banned?'<span class="badge war">BANNED</span>':"") + `
    <div>${p.alliance_id
      ? `Alliance: <a href="#" id="alink">${esc(p.alliance_name)}</a>${since?` <span class="badge">member since ${dshort(since)}</span>`:` <span class="badge" title="joined before the tracker started recording">member since before tracking</span>`}`
      : `<span class="muted">No alliance</span>`}

    <div class="statgrid">
      <div class="stat"><div class="k">Might (current)</div><div class="v gold">${fmt(p.might_current)}</div></div>
      <div class="stat"><div class="k">Might (all-time)</div><div class="v">${fmt(p.might_all_time)}</div></div>
      <div class="stat"><div class="k">Honor</div><div class="v">${fmt(p.honor)} <span class="muted">/ max ${fmt(p.max_honor)}</span></div></div>
      <div class="stat"><div class="k">Loot (current era)</div><div class="v">${fmt(p.loot_current)}</div></div>
      <div class="stat"><div class="k">Loot (all-time)</div><div class="v">${fmt(p.loot_all_time)}</div></div>
      <div class="stat"><div class="k">Glory</div><div class="v">${fmt(p.current_fame)}</div></div>
      <div class="stat"><div class="k">${pc.banned?"Ban":"Peace mode"}</div><div class="v ${pc.banned?"war":(pc.until?"peace":"war")}">${pc.until?"until "+dfull(pc.until):"No"}</div></div>
    </div>
    ${spySection(id)}
    <h3 class="sec">Alliance history</h3>
    ${updates.length ? `<div class="timeline">
      ${updates.map((u,i)=>`<div class="tl-item" style="animation-delay:${i*40}ms">
        <div class="when">${dfull(Date.parse(u.date))}</div>
        <div>${u.new_alliance_id==null
            ? `left ${aLink(u.old_alliance_id, u.old_alliance_name)}`
            : `joined ${aLink(u.new_alliance_id, u.new_alliance_name)}${u.old_alliance_id!=null?` <span class="muted">(from ${esc(u.old_alliance_name||"")})</span>`:""}`}
          <span class="muted"> · ${i===0 ? "for " + durBetween(u.date, new Date().toISOString()) + " so far" : "stayed " + durBetween(u.date, updates[i-1].date)}</span></div>

    ${castles.length?`<h3 class="sec">Castles — realtime (${castles.length})</h3>
    <div class="tblwrap"><table><tr><th>Name</th><th>Type</th><th>Kingdom</th><th>Coords</th><th>Keep</th><th>Wall</th><th>Gate</th><th>Tower</th><th>Moat</th></tr>
    ${castles.map(cs=>`<tr>
      <td>${esc(cs.name)||"—"}</td><td>${CASTLE_TYPES[cs.type]||"Type "+cs.type}</td>

      <td class="mono">${cs.keepLevel??"—"}</td><td class="mono">${cs.wallLevel??"—"}</td><td class="mono">${cs.gateLevel??"—"}</td><td class="mono">${cs.towerLevel??"—"}</td><td class="mono">${cs.moatLevel??"—"}</td>
    </tr>`).join("")}</table></div>
    <div class="hint" style="margin-top:6px">Defense levels are fetched live from the game — solid pre-attack intel.</div>`:""}`);
  bindPlayerHead(id, name, p.alliance_name, Number(p.might_current), pc.banned?null:pc.until, pc.banned);
  if ($("alink")) $("alink").onclick = e=>{ e.preventDefault(); openAlliance(p.alliance_id); };
  document.querySelectorAll(".palink").forEach(a=> a.onclick = e=>{ e.preventDefault(); openAlliance(a.dataset.aid); });
  renderWatchlist();
}

/* ---------- alliance detail ---------- */
let lastAllianceMembers = [];
let lastAllianceMeta = null; // {aid, name, mock, totalMP}
let memberSort = { key:"might", dir:-1 };
function addEnemyRow(id){
  const m = lastAllianceMembers.find(x=>String(x.id)===String(id));
  if (!m) return;
  addEnemy(m.id, m.name, m.allianceName, m.might, m.peaceUntil, m.banned);
  toast(m.name + " added to enemies");
  renderAllianceView();
}
async function openAlliance(aid, rerenderOnly){
  currentView = { type:"alliance", id:aid };
  if (!rerenderOnly) pushView({ type:"alliance", id:aid });
  if (rerenderOnly && lastAllianceMeta && String(lastAllianceMeta.aid) === String(aid)) return renderAllianceView();
  setMain(`<div class="empty"><span class="spin"></span> Fetching alliance ${esc(aid)}…</div>`);
  let A;
  try { A = await tCall("/alliances/id/" + aid); }
  catch(e){ setMain(`<div class="err">Failed to load alliance ${esc(aid)}: ${esc(e.message)}</div>`); return; }
  const M = A.players || [];
  for (const m of M){
    const pc = classifyPeace(m.peace_disabled_at);
    snap(m.player_id, m.player_name, aid, A.alliance_name, m.might_current, m.level, m.legendary_level, pc.banned?null:pc.until);
  }
  save();
  lastAllianceMembers = M.map(m=>{
    const pc = classifyPeace(m.peace_disabled_at);
    return { id:m.player_id, name:m.player_name, might:Number(m.might_current), peaceUntil:pc.until, banned:pc.banned, allianceName:A.alliance_name, since:undefined, past:null };
  });
  // prefill from cached history
  for (const m of lastAllianceMembers){
    const r = db.players[pkey(m.id)];
    if (r?.hist && Date.now()-r.hist.t < 6*3600*1000){
      m.since = sinceFromUps(r.hist.ups, aid);
      m.past = pastFromUps(r.hist.ups, aid);
    }
  }
  lastAllianceMeta = {
    aid, name: A.alliance_name, mock: isMockedAlliance(A.alliance_name),
    totalMP: M.reduce((s,m)=>s+Number(m.might_current||0),0)
  };
  renderAllianceView();
  autoLoadHistory(aid);
}
function renderAllianceView(){
  const { aid, name, mock, totalMP } = lastAllianceMeta;
  const getters = { name:m=>m.name?.toLowerCase(), might:m=>m.might, peace:m=>m.banned?-1:(m.peaceUntil||0), since:m=>m.since===undefined?Infinity:(m.since??0) };
  const sorted = sortBy(lastAllianceMembers, memberSort.key, memberSort.dir, getters);
  const th = (label, key) => key ? `<th class="sortable" data-msort="${key}">${label} ${sortArrow(memberSort, key)}</th>` : `<th>${label}</th>`;
  setMain(`
    <div class="detail-head"><h2>${esc(name||("#"+aid))}</h2> ${copyBtn(name||"")}
      ${mock?'<span class="badge war" style="font-size:13px">a.k.a. Horde of Bots 🤖</span>':""}
      <span class="idtag">AID ${aid}</span>
      <button class="btn small" id="reA">Refresh</button></div>
    <div class="statgrid">
      <div class="stat"><div class="k">Members</div><div class="v">${lastAllianceMembers.length}</div></div>
      <div class="stat"><div class="k">Total might</div><div class="v gold">${fmt(totalMP)}</div></div>
      <div class="stat"><div class="k">In peace</div><div class="v peace">${lastAllianceMembers.filter(m=>m.peaceUntil&&!m.banned).length}</div></div>
      <div class="stat"><div class="k">Banned</div><div class="v war">${lastAllianceMembers.filter(m=>m.banned).length}</div></div>
    </div>
    <h3 class="sec">Members — click a row to scout</h3>
    <div class="etools">
      <button class="btn small war" id="addAllEnemies" title="Add every member below to your enemy list">⚔ Add all ${lastAllianceMembers.length} members to enemy list</button>
      <span class="hint" id="histStatus"></span>
    </div>
    <div class="tblwrap"><table><tr>${th("Name","name")}${th("Might","might")}${th("Peace","peace")}${th("In alliance since","since")}${th("Past alliances (last 3)")}${mock?th("Certification"):""}${th("")}</tr>
    ${sorted.map((m,i)=>{
      const isE = !!enemies()[m.id];
      const sinceTxt = m.since===undefined ? "…" : (m.since ? dshort(m.since) : "before tracking");
      return `<tr class="click" data-open="${escA(m.name)}">
      <td>${esc(m.name)} ${copyBtn(m.name)}</td>
      <td class="mono">${fmt(m.might)}</td>
      <td>${peaceBadge(m.peaceUntil, m.banned)}</td>
      <td class="mono muted" data-since="${escA(m.id)}">${sinceTxt}</td>
      <td style="font-size:12px" data-past="${escA(m.id)}">${m.past?pastCellHtml(m.past):'<span class="muted">…</span>'}</td>
      ${mock?`<td><span class="badge war" title="certification issued by TITANS Intel, 100% peer reviewed">🤖 certified bot user</span></td>`:""}
      <td><button class="btn small ${isE?"":"war"}" title="${isE?"already on enemy list":"add to enemy list"}" onclick='event.stopPropagation();addEnemyRow(${JSON.stringify(String(m.id))})'>${isE?"⚔ ✓":"⚔"}</button></td>
      </tr>`;}).join("")}
    </table></div>
    <div class="hint" style="margin-top:6px"><span class="vet" style="font-size:11px">Highlighted</span> past alliance = the player spent more time there than in this one. Click column headers to sort. BANNED = protection over 63 days.</div>`);
  $("reA").onclick = () => { lastAllianceMeta = null; openAlliance(aid); };
  $("addAllEnemies").onclick = () => { lastAllianceMembers.forEach(m=>addEnemy(m.id,m.name,m.allianceName,m.might,m.peaceUntil,m.banned)); toast("All members added"); renderAllianceView(); };
  $("main").querySelectorAll("[data-open]").forEach(r=> r.onclick = ()=> openPlayer(r.dataset.open));
  $("main").querySelectorAll("[data-msort]").forEach(h => h.onclick = () => {
    const k = h.dataset.msort;
    memberSort = { key:k, dir: memberSort.key===k ? -memberSort.dir : (k==="name"?1:-1) };
    renderAllianceView();
  });
  renderWatchlist(); updateEnemyCount();
}
async function autoLoadHistory(aid){
  const myMeta = lastAllianceMeta;
  let i = 0, total = lastAllianceMembers.length;
  for (const m of lastAllianceMembers){
    if (lastAllianceMeta !== myMeta || currentView.type !== "alliance") return;
    i++;
    try {
      const cached = db.players[pkey(m.id)]?.hist && Date.now()-db.players[pkey(m.id)].hist.t < 6*3600*1000;
      const ups = await tPlayerHist(m.id);
      m.since = sinceFromUps(ups, aid);
      m.past = pastFromUps(ups, aid);
      const cell = $("main").querySelector(`[data-since="${m.id}"]`);
      if (cell) cell.textContent = m.since ? dshort(m.since) : "before tracking";
      const pcell = $("main").querySelector(`[data-past="${m.id}"]`);
      if (pcell) pcell.innerHTML = pastCellHtml(m.past);
      if (m.since){
        const r = prec(m.id); r.name = m.name;
        if (!r.snaps.some(s=>String(s.AID)===String(aid) && s.t <= m.since+1000))
          { r.snaps.unshift({ t:m.since, AID:aid, AN:m.allianceName, MP:m.might, L:null, LL:null, PU:null }); r.snaps.sort((a,b)=>a.t-b.t); }
      }
      const status = $("histStatus");
      if (status) status.textContent = i < total ? `Loading member history ${i}/${total}…` : "";
      if (!cached) await new Promise(r=>setTimeout(r,300));
    } catch(e){}
  }
  const status = $("histStatus");
  if (status) status.textContent = "";
  save();
}

/* ---------- watchlist ---------- */
function renderWatchlist(){
  const pref = srvKey() + ":";
  const items = Object.entries(db.players).filter(([k,v]) => v.watch && k.startsWith(pref));
  $("watchlist").innerHTML = items.length
    ? items.map(([k,v],i)=>{
        const last = v.snaps[v.snaps.length-1];
        return `<div class="prow" style="animation-delay:${i*30}ms" data-open="${escA(v.name)}">
          <div style="min-width:0"><div class="nm">${esc(v.name)}</div>
          <div class="sub">${last?(last.AID?esc(last.AN||("#"+last.AID)):"no alliance")+" · "+fmt(last.MP)+" MP":""}</div></div>
          <div class="right">${v.snaps.length}◈</div></div>`;
      }).join("")
    : `<div class="hint">No watched players here. Open a player and hit ☆ Watch.</div>`;
  $("watchlist").querySelectorAll("[data-open]").forEach(r=> r.onclick = ()=> openPlayer(r.dataset.open));
}
$("refreshWatch").onclick = async () => {
  const pref = srvKey() + ":";
  const items = Object.entries(db.players).filter(([k,v]) => v.watch && k.startsWith(pref));
  if (!items.length) return;
  const btn = $("refreshWatch"); btn.disabled = true;
  let i = 0;
  for (const [k,v] of items){
    btn.textContent = `Refreshing ${++i}/${items.length}…`;
    try {
      const p = await tCall("/players/" + encodeURIComponent(v.name));
      const pc = classifyPeace(p.peace_disabled_at);
      snap(p.player_id,p.player_name,p.alliance_id,p.alliance_name,p.might_current,p.level,p.legendary_level,pc.banned?null:pc.until);
    } catch(e){}
    await new Promise(r=>setTimeout(r,350));
  }
  save();
  btn.disabled = false; btn.textContent = "Refresh all";
  renderWatchlist();
};

/* ---------- export / import ---------- */
$("exportBtn").onclick = () => {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([JSON.stringify(db)],{type:"application/json"}));
  a.download = "titans-intel-data.json"; a.click();
};
$("importBtn").onclick = () => $("importFile").click();
$("importFile").onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  f.text().then(t => {
    const inc = JSON.parse(t);
    for (const [k,v] of Object.entries(inc.players||{})){
      if (!db.players[k]) db.players[k] = v;
      else {
        const seen = new Set(db.players[k].snaps.map(s=>s.t));
        db.players[k].snaps.push(...(v.snaps||[]).filter(s=>!seen.has(s.t)));
        db.players[k].snaps.sort((a,b)=>a.t-b.t);
        const seenSpy = new Set((db.players[k].spy||[]).map(s=>s.t));
        (db.players[k].spy||(db.players[k].spy=[])).push(...(v.spy||[]).filter(s=>!seenSpy.has(s.t)));
        db.players[k].watch = db.players[k].watch || v.watch;
      }
    }
    for (const [sk,list] of Object.entries(inc.enemies||{})){
      db.enemies[sk] = db.enemies[sk] || {};
      for (const [id,en] of Object.entries(list)) if (!db.enemies[sk][id]) db.enemies[sk][id] = en;
    }
    save(); renderWatchlist(); updateEnemyCount(); toast("Import merged");
  }).catch(()=>toast("Invalid file"));
};

/* ---------- wiring ---------- */
$("goBtn").onclick = doSearch;
$("q").addEventListener("keydown", e=>{ if (e.key==="Enter") doSearch(); });
$("goAlliance").onclick = findAlliance;
$("qa").addEventListener("keydown", e=>{ if (e.key==="Enter") findAlliance(); });
$("openEnemies").onclick = openEnemies;
window.copyText = copyText; window.toggleAttacked = toggleAttacked; window.setNotes = setNotes;
window.askSpy = askSpy; window.showSpy = showSpy; window.delSpy = delSpy;
window.removeEnemy = removeEnemy; window.openPlayer = openPlayer; window.addEnemyRow = addEnemyRow; window.openAlliance = openAlliance;
loadServers();
</script>
